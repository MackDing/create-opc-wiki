name: Bug report
description: Something scaffolded wrong, or the generated vault misbehaves.
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: command
    attributes:
      label: Command you ran
      placeholder: npx -y create-opc-wiki@latest ~/wiki --yes --agents=claude
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual
      description: What actually happened? Paste full stderr / logs if relevant.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: create-opc-wiki version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: v22.11.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15.3 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Agent you're using, vault size, unusual setup, etc.
